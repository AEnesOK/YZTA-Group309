<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kod Paylaş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold m-0" style="font-family: 'Outfit', sans-serif;">Yeni Kod Paylaş</h2>
                    <a href="/" class="btn btn-premium-outline btn-sm px-3">Geri Dön</a>
                </div>

                <div class="glass-card">
                    <form action="/post" method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Başlık</label>
                            <input type="text" name="title" class="form-control" required placeholder="Örn: Fibonacci Fonksiyonu Optimizasyonu">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Dil</label>
                            <select name="language" class="form-select border-0 shadow-sm" style="background-color: #f8fafc;">
                                <option value="Python">Python</option>
                                <option value="JavaScript">JavaScript</option>
                                <option value="HTML/CSS">HTML/CSS</option>
                                <option value="C++">C++</option>
                                <option value="Java">Java</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted">Kod Bloğu</label>
                            <textarea name="content" class="form-control" rows="12" required style="font-family: Consolas, monospace; background-color: #f8fafc;" placeholder="Kodunuzu buraya yapıştırın..."></textarea>
                        </div>
                        <div class="d-flex justify-content-end mt-4">
                            <button type="submit" class="btn btn-premium px-5 py-2">Paylaş</button>
                        </div>
                    </form>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
